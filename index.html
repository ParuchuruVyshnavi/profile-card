<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Modern Developer Profile</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <div class="background-blur blur1"></div>
    <div class="background-blur blur2"></div>

    <div class="card-container">

        <div class="card">

            <!-- Theme Button -->

            <button class="theme-btn" id="themeToggle">

                <i class="fa-solid fa-moon" id="themeIcon"></i>

            </button>

            <!-- Profile -->

            <div class="profile-wrapper">

                <div class="profile-ring"></div>

                <img src="images/profile.jpg"
                    alt="Profile"
                    class="profile-img">

                <div class="status">

                    <span class="dot"></span>

                    Available

                </div>

            </div>

            <!-- Name -->

            <h1 class="name">

                Paruchuru Vyshnavi

            </h1>

            <!-- Developer Badge -->

            <div class="developer-badge">

                <span class="code-left">&lt;/&gt;</span>

                <span id="typing"></span>

                <span class="code-right">&lt;&gt;</span>

            </div>

            <!-- Social Icons -->

            <div class="social-icons">

                <a href="https://github.com/ParuchuruVyshnavi"
                    target="_blank">

                    <i class="fa-brands fa-github"></i>

                </a>

                <a href="mailto:paruchuruvyshnavi87@gmail.com">

                    <i class="fa-solid fa-envelope"></i>

                </a>

                <a href="https://linkedin.com/in/your-link"
                    target="_blank">

                    <i class="fa-brands fa-linkedin-in"></i>

                </a>

            </div>

            <!-- Buttons -->

            <div class="button-group">

                <button class="btn follow-btn">

                    <i class="fa-solid fa-user-plus"></i>

                    Follow

                </button>

                <button class="btn message-btn">

                    <i class="fa-solid fa-paper-plane"></i>

                    Message

                </button>

            </div>

            <!-- Skills -->

            <div class="skills-title">

                <span>MY SKILLS</span>

            </div>

            <div class="skills">

                <div class="skill-card">

                    <div class="skill-icon">

                        <i class="fa-brands fa-html5"></i>

                    </div>

                    <h3>HTML</h3>

                    <p>Structure</p>

                    <div class="progress">

                        <span style="width:95%"></span>

                    </div>

                </div>

                <div class="skill-card">

                    <div class="skill-icon">

                        <i class="fa-brands fa-css3-alt"></i>

                    </div>

                    <h3>CSS</h3>

                    <p>Styling</p>

                    <div class="progress">

                        <span style="width:90%"></span>

                    </div>

                </div>

                <div class="skill-card">

                    <div class="skill-icon">

                        <i class="fa-brands fa-js"></i>

                    </div>

                    <h3>JavaScript</h3>

                    <p>Interactive UI</p>

                    <div class="progress">

                        <span style="width:80%"></span>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
